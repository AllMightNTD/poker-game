services:
  app-dev:
    container_name: nestjs-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - '${APP_PORT}:${APP_PORT}'
      - '127.0.0.1:9229:9229'  # Chỉ bind debug port về localhost
    volumes:
      - .:/app
      - /app/node_modules
      - ~/.npm:/root/.npm
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network
    restart: "no"  # Dev không cần auto-restart, tránh permission lock

  db:
    image: mysql:8.0
    container_name: mysql-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}  # Tách riêng root password
      MYSQL_ALLOW_EMPTY_PASSWORD: false
      MYSQL_RANDOM_ROOT_PASSWORD: false
      TZ: Asia/Ho_Chi_Minh
    ports:
      - '13306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME}", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s  # Cho MySQL đủ thời gian init lần đầu
    networks:
      - app_network
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - app_network
    restart: "no"

  redis-commander:
    image: rediscommander/redis-commander:latest  # Pin version, tránh breaking change
    container_name: redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD}
      - HTTP_USER=${REDIS_COMMANDER_USER}          # Đưa vào .env
      - HTTP_PASSWORD=${REDIS_COMMANDER_PASSWORD}  # Đưa vào .env
    ports:
      - '127.0.0.1:8081:8081'  # Chỉ truy cập từ localhost
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network
    restart: "no"

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data: