# ============================================================
# Upstream + DNS resolver
# Dùng resolver của Docker (127.0.0.11) + biến $... để nginx
# re-resolve tên service khi container FE/BE restart/redeploy,
# tránh lỗi "host not found" hoặc cache IP cũ.
# ============================================================
resolver 127.0.0.11 valid=10s;

# Rate limit cho API (chống spam/brute-force), không áp cho websocket
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ============================================================
# HTTP -> HTTPS redirect
# ============================================================
server {
    listen 80;
    server_name your-domain.com;   # TODO: đổi thành domain thật

    # Cho phép ACME challenge (Let's Encrypt certbot) đi qua HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS server chính
# ============================================================
server {
    listen 443 ssl;
    http2 on;
    server_name your-domain.com;   # TODO: đổi thành domain thật

    # --- SSL ---
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    server_tokens off;

    # --- Gzip ---
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    client_max_body_size 20m;

    # ==============================
    # 1. Frontend
    # ==============================
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==============================
    # 2. Backend APIs
    # ==============================
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        limit_conn conn_limit 20;

        set $backend_upstream http://backend:3002;
        proxy_pass $backend_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ==============================
    # 3. WebSocket (Socket.IO - Poker Game realtime)
    # Kết nối sống lâu -> timeout phải dài, tắt buffering
    # ==============================
    location /socket.io/ {
        set $backend_ws_upstream http://backend:3002;
        proxy_pass $backend_ws_upstream/socket.io/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;   # giữ kết nối lâu, trány disconnect giữa ván bài
        proxy_send_timeout 3600s;
    }

    # ==============================
    # 4. (Tùy chọn) Redis Commander qua subpath /redis/
    # Chỉ nên bật tạm khi debug (đi kèm profile "debug" trong compose)
    # và nên thêm basic auth ở lớp nginx nữa cho chắc.
    # ==============================
    # location /redis/ {
    #     set $redis_commander_upstream http://redis-commander:8081;
    #     proxy_pass $redis_commander_upstream/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }
}