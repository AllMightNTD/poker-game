name: Keep Render Backend Alive

on:
  schedule:
    # Chạy mỗi 15 phút (mức khuyên dùng tối đa của GitHub Actions Free)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Cho phép nhấn chạy thủ công từ giao diện GitHub Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Check Endpoint
        run: |
          if [ -z "${{ secrets.RENDER_BACKEND_URL }}" ]; then
            echo "Warning: RENDER_BACKEND_URL secret is not set. Please set it in your repository secrets."
            exit 1
          fi
          
          echo "Pinging backend at ${{ secrets.RENDER_BACKEND_URL }}/health..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_BACKEND_URL }}/health")
          
          echo "HTTP Response code: $RESPONSE"
          if [ "$RESPONSE" -eq 200 ]; then
            echo "Backend is active and healthy!"
          else
            echo "Failed to contact backend or status is not healthy."
            exit 1
          fi
